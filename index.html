.careerGrid{height:calc(100vh - 250px);overflow:auto;padding:4px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.career{height:170px;border:4px solid rgba(255,255,255,.65);border-radius:30px;overflow:hidden;background-size:cover;background-position:center;position:relative;box-shadow:0 10px 0 rgba(0,0,0,.22);transition:.12s}.career:active{transform:scale(.94)}.career:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 35%,rgba(15,23,42,.82))}.careerName{position:absolute;left:8px;right:8px;bottom:10px;z-index:2;font-size:19px;font-weight:1000;text-align:center;text-shadow:0 3px 0 #000}.lockBadge{position:absolute;top:10px;right:10px;z-index:3;font-size:25px;background:rgba(15,23,42,.7);border-radius:14px;padding:5px}.free{background:#22c55e;color:white;border-radius:999px;padding:4px 8px;font-size:11px;margin-top:4px;display:inline-block}
.mapWrap{height:100vh;overflow:auto;padding-top:70px;padding-bottom:96px}.worldMap{position:relative;width:1500px;height:1030px;margin:auto}.ocean{position:absolute;inset:0;border-radius:50px;background:radial-gradient(circle at 30% 20%,#7dd3fc,#0ea5e9 48%,#1d4ed8);box-shadow:inset 0 0 45px rgba(255,255,255,.25);overflow:hidden}.ocean:before{content:"";position:absolute;inset:-30%;background:repeating-linear-gradient(120deg,rgba(255,255,255,.18) 0 2px,transparent 2px 42px);animation:waves 8s linear infinite;opacity:.45}@keyframes waves{to{transform:translateX(-120px)}}.path{position:absolute;height:12px;border-radius:999px;background:repeating-linear-gradient(90deg,#fff 0 20px,transparent 20px 38px);opacity:.85;animation:path 1.2s linear infinite;box-shadow:0 0 14px rgba(255,255,255,.8)}@keyframes path{to{background-position:78px 0}}
.island{position:absolute;width:230px;height:165px;border-radius:40px;overflow:hidden;background-size:cover;background-position:center;border:4px solid rgba(255,255,255,.75);box-shadow:0 18px 32px rgba(0,0,0,.35);animation:float 4s ease-in-out infinite;z-index:2}@keyframes float{50%{transform:translateY(-10px)}}.island.locked{filter:grayscale(.85) brightness(.48)}.island:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.82))}.islandLabel{position:absolute;z-index:3;left:8px;right:8px;bottom:8px;font-weight:1000;text-align:center;text-shadow:0 3px 0 #000;font-size:18px}.req{font-size:12px;opacity:.9}.lock{position:absolute;z-index:4;top:48%;left:50%;transform:translate(-50%,-50%);font-size:48px;animation:lock 2s infinite ease}@keyframes lock{50%{transform:translate(-50%,-64%)}}.heroToken{position:absolute;width:78px;height:78px;border-radius:24px;background:white;border:5px solid var(--c);z-index:8;display:grid;place-items:center;font-size:39px;box-shadow:0 10px 0 rgba(0,0,0,.25);animation:token 1.6s infinite ease}@keyframes token{50%{transform:translateY(-9px)}}.bottom{position:fixed;left:8px;right:8px;bottom:8px;z-index:60;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.bottom .btn{margin:0;padding:13px 6px;font-size:13px}

let train="basic", targetWord="", guidedTimer=null;const $=id=>document.getElementById(id);const get=(k,d="")=>localStorage.getItem(k)??d,set=(k,v)=>localStorage.setItem(k,String(v));const num=(k,d=0)=>{let v=parseInt(get(k,d));return isNaN(v)?d:v};function xp(){return num("ml_final_xp")}function coins(){return num("ml_final_coins")}function active(){return get("ml_final_active","")}function unlocked(){try{return JSON.parse(get("ml_final_unlocked","[]"))}catch(e){return []}}function saveUnlocked(a){set("ml_final_unlocked",JSON.stringify(a))}function career(id=active()){return CAREERS.find(c=>c.id===id)||CAREERS[0]}function rank(){let r=RANKS[0];RANKS.forEach(x=>{if(xp()>=x[1])r=x});return r}function nextRank(){return RANKS.find(x=>x[1]>xp())}function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active");update();window.scrollTo(0,0)}function renderCareers(){let first=!active();$("careerGrid").innerHTML=CAREERS.map(c=>{let u=unlocked().includes(c.id)||first||xp()>=c.unlock;return `<div class="career" onclick="chooseCareer('${c.id}')" style="background-image:url('${c.img}')">${!u?'<div class="lockBadge">🔒</div>':''}<div class="careerName">${c.icon} ${c.name}<br><span class="free">${first?'1ª escolha grátis':u?'Liberado':'Precisa '+c.unlock+' XP'}</span></div></div>`}).join("")}
function chooseCareer(id){let first=!active();let c=career(id);let arr=unlocked();if(!first&&!arr.includes(id)&&xp()<c.unlock){modal("🔒","CARREIRA BLOQUEADA","Você precisa de",c.unlock+" XP");return}if(!arr.includes(id))arr.push(id);saveUnlocked(arr);set("ml_final_active",id);set("ml_final_player",$("playerName").value.trim()||get("ml_final_player","Herói"));modal(c.icon,"CARREIRA ESCOLHIDA",c.name,"MISSÃO ATIVADA");show("map")}
function update(){let c=career();document.body.className=c.theme;$("xpHud").innerText=xp();$("coinHud").innerText=coins();$("rankHud").innerText=rank()[0];$("playerName").value=get("ml_final_player","");$("stageHero").style.backgroundImage=`url('${c.img}')`;$("missionTitle").innerText=c.title;$("missionStory").innerText=c.mission;let nr=nextRank();$("xpFill").style.width=nr?Math.min(xp()/nr[1]*100,100)+"%":"100%";renderMap();renderCareers();if(!$("phrase").innerText)newPhrase(true)}
function renderMap(){let arr=unlocked();let first=!active();let paths="";let ids=CAREERS.map(c=>c.id);for(let i=0;i<ids.length-1;i++){let a=POS[ids[i]],b=POS[ids[i+1]];if(!a||!b)continue;let dx=b[0]-a[0],dy=b[1]-a[1],len=Math.hypot(dx,dy),ang=Math.atan2(dy,dx)*180/Math.PI;paths+=`<div class="path" style="left:${a[0]+120}px;top:${a[1]+80}px;width:${len}px;transform:rotate(${ang}deg);transform-origin:left center"></div>`}$("paths").innerHTML=paths;let html="";CAREERS.forEach(c=>{let p=POS[c.id]||[100,100];let u=arr.includes(c.id)||first||xp()>=c.unlock;html+=`<div class="island ${u?'':'locked'}" onclick="chooseCareer('${c.id}')" style="left:${p[0]}px;top:${p[1]}px;background-image:url('${c.img}')">${u?'':'<div class="lock">🔒</div>'}<div class="islandLabel">${c.icon} ${c.short}<div class="req">${u?'Liberado':'Precisa '+c.unlock+' XP'}</div></div></div>`});$("islands").innerHTML=html;let p=POS[active()]||POS.cbmerj;$("heroToken").style.left=(p[0]+75)+"px";$("heroToken").style.top=(p[1]-50)+"px";$("heroToken").innerText=career().icon}
function norm(t){return(t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[.,!?;:]/g,"").replace(/\s+/g," ").trim()}function hard(t){return /(nh|lh|ch|mp|mb|br|cr|dr|fr|gr|pr|tr|vr|pl|cl|bl|fl|gl|rr|ss|qu|gu)/i.test(norm(t))}function newPhrase(force=true){let list=[...career().phrases,"O gato pulou.","A bola caiu.","A menina riu.","O pato nadou.","A pipa voou.","A mala caiu.","O sapo pulou.","O livro abriu.","A lua brilhou."].filter(f=>!hard(f));let p=list[Math.floor(Math.random()*list.length)]||"O aluno leu.";$("phrase").innerHTML=p.split(" ").map(w=>`<span class="word">${w}</span>`).join(" ");$("status").innerText=""}function words(t){return norm(t).split(" ").filter(w=>w.length>1&&!["o","a","e","de","do","da","no","na","um","uma"].includes(w))}
function guide(){clearInterval(guidedTimer);let ws=[...document.querySelectorAll(".word")],i=0;ws.forEach(w=>w.classList.remove("active"));guidedTimer=setInterval(()=>{ws.forEach(w=>w.classList.remove("active"));if(i>=ws.length){clearInterval(guidedTimer);return}ws[i++].classList.add("active")},800)}function speak(t){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance("VAAALENDO! "+t);u.lang="pt-BR";u.pitch=1.25;u.rate=1.15;speechSynthesis.speak(u)}catch(e){}}function speakPhrase(){speak($("phrase").innerText)}
function listen(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){$("status").innerText="Este navegador não suporta voz.";return}let r=new SR();r.lang="pt-BR";r.interimResults=true;r.onresult=e=>{let txt="";for(let i=e.resultIndex;i<e.results.length;i++)txt+=e.results[i][0].transcript;$("status").innerText="Ouvindo: "+txt;if(e.results[e.results.length-1].isFinal){similar($("phrase").innerText,txt)>=.55?reward():$("status").innerText="Quase! Leia de novo."}};r.start()}function similar(a,b){let A=words(a),B=words(b),hit=0;A.forEach(w=>{if(B.includes(w))hit++});return hit/Math.max(A.length,1)}function manual(){let w=words($("phrase").innerText);targetWord=w[0]||"";$("question").innerText='Digite a palavra "'+targetWord+'"';$("answer").value="";$("manualBox").style.display="block"}function confirmManual(){if(norm($("answer").value)===targetWord)reward();else $("status").innerText="Quase!";$("manualBox").style.display="none"}function reward(){set("ml_final_xp",xp()+15);set("ml_final_coins",coins()+3);animate();newPhrase(true);update();$("status").innerText="🎉 Missão completa!"}function skip(){set("ml_final_xp",Math.max(0,xp()-5));newPhrase(true);update();$("status").innerText="Perdeu 5 XP por trocar."}function animate(){let d=document.createElement("div");d.className="coin";d.innerText=career().effect;d.style.left="50vw";d.style.top="60vh";d.style.setProperty("--x",(Math.random()*140-70)+"px");document.body.appendChild(d);setTimeout(()=>d.remove(),1100);confetti(25);speak("QUE DOIDERA! Missão cumprida!")}function confetti(q){const colors=["#facc15","#fb7185","#38bdf8","#22c55e","#a78bfa"];for(let i=0;i<q;i++){let c=document.createElement("div");c.className="confetti";c.style.left=Math.random()*100+"vw";c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.animationDuration=(Math.random()*1.4+1.8)+"s";document.body.appendChild(c);setTimeout(()=>c.remove(),3500)}}function setTrain(m){train=m;nextTrain()}function nextTrain(){let list=TRAIN[train];$("trainText").innerText=list[Math.floor(Math.random()*list.length)]}function modal(i,t,txt,b){$("modalIcon").innerText=i;$("modalTitle").innerText=t;$("modalText").innerText=txt;$("modalBig").innerText=b;$("modal").style.display="flex"}function closeModal(){$("modal").style.display="none"}function resetGame(){if(confirm("Apagar progresso?")){Object.keys(localStorage).forEach(k=>{if(k.startsWith("ml_final_"))localStorage.removeItem(k)});location.reload()}}document.addEventListener("click",e=>{let w=e.target.closest(".word");if(w)speak(w.innerText)});document.addEventListener("DOMContentLoaded",()=>{if(active())show("map");update();nextTrain()})
</script></body></html>
