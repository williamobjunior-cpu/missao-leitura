<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missão Leitura V10</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}
.card{
width:90%;
max-width:500px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:35px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}
.avatar{
font-size:90px;
animation:float 2s infinite ease-in-out;
}
@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}
button{
margin-top:20px;
padding:18px;
width:100%;
border:none;
border-radius:30px;
font-size:20px;
font-weight:bold;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
cursor:pointer;
box-shadow:0 8px 0 rgba(0,0,0,.2);
transition:.15s;
}
button:active{
transform:scale(.95);
box-shadow:0 3px 0 rgba(0,0,0,.2);
}
</style>
</head>
<body>
<div class="card">
<div class="avatar">🤖</div>
<h1>Missão Leitura V10</h1>
<p>Modo Play Store ativado.</p>
<button onclick="alert('Sistema funcionando!')">COMEÇAR 🚀</button>
</div>
</body>
</html>
